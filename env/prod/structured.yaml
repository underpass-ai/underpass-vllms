cache:
  enabled: true
  existingClaim: ""
  storageClass: ""
  size: 80Gi
  accessMode: ReadWriteOnce
  mountPath: /tmp/hf-cache
  emptyDirSizeLimit: 20Gi

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
  interval: 30s
  path: /metrics

structured:
  enabled: true
  imagePullSecrets: []
  image:
    repository: docker.io/vllm/vllm-openai
    tag: v0.19.1-x86_64-cu130
    pullPolicy: IfNotPresent
  model: palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4
  tensorParallelSize: 2
  maxModelLen: 8192
  maxNumSeqs: 1
  gpuMemoryUtilization: 0.92
  enforceEager: false
  extraArgs:
    - --language-model-only
    - '--default-chat-template-kwargs={"enable_thinking": false}'
  env:
    HF_HOME: /tmp/hf-cache
    LD_LIBRARY_PATH: /usr/lib
  huggingface:
    tokenSecret: huggingface-token
    tokenKey: HF_TOKEN
  shmSizeLimit: 2Gi
  resources:
    requests:
      cpu: "8"
      memory: 48Gi
      nvidia.com/gpu: "2"
    limits:
      cpu: "16"
      memory: 64Gi
      nvidia.com/gpu: "2"
  probes:
    startup:
      periodSeconds: 10
      failureThreshold: 180
    readiness:
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      periodSeconds: 30
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: ""
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: ""
    mtls:
      enabled: false
      clientCaSecret: ""
