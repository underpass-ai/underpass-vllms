cache:
  enabled: true
  existingClaim: ""
  storageClass: ""
  size: 80Gi
  accessMode: ReadWriteOnce
  mountPath: /tmp/hf-cache
  emptyDirSizeLimit: 20Gi

dns:
  route53:
    enabled: true
    target: 192.168.1.241
    ttl: 300

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
  interval: 30s
  path: /metrics

reasoning:
  enabled: false

structured:
  enabled: true
  imagePullSecrets: []
  image:
    repository: docker.io/vllm/vllm-openai
    tag: v0.19.1-x86_64-cu130
    pullPolicy: IfNotPresent
  model: Qwen/Qwen2.5-0.5B-Instruct
  tensorParallelSize: 1
  maxModelLen: 4096
  maxNumSeqs: 8
  gpuMemoryUtilization: 0.70
  enforceEager: false
  lora:
    enabled: true
    maxRank: 16
    adapters:
      - name: operator-v8.1.2
        path: /adapters/operator-v8.1.2-sft-v2
  adapterVolume:
    enabled: true
    mountPath: /adapters/operator-v8.1.2-sft-v2
    hostPath: /var/lib/operator-adapters/v8.1.2-sft-v2-canonical
    hostPathType: Directory
  env:
    HF_HOME: /tmp/hf-cache
    LD_LIBRARY_PATH: /usr/lib
  huggingface:
    tokenSecret: huggingface-token
    tokenKey: HF_TOKEN
  shmSizeLimit: 2Gi
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
      nvidia.com/gpu: "1"
    limits:
      cpu: "8"
      memory: 16Gi
      nvidia.com/gpu: "1"
  probes:
    startup:
      periodSeconds: 10
      failureThreshold: 120
    readiness:
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      periodSeconds: 30
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    className: nginx
    host: 0.5b.llm.underpassai.com
    tls:
      enabled: true
      secretName: underpass-llm-operator-qwen05-vllm-tls
      clusterIssuer: letsencrypt-prod-r53
    mtls:
      enabled: true
      clientCaSecret: underpass-demo-client-tls

orchestrator:
  enabled: false
