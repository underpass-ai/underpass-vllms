{{- $root := . -}}
{{- range $component := list "reasoning" "structured" }}
{{- $cfg := index $root.Values $component }}
{{- if $cfg.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "underpass-llm.componentName" (dict "root" $root "component" $component) }}
  labels:
    {{- include "underpass-llm.componentLabels" (dict "root" $root "component" $component) | nindent 4 }}
spec:
  type: {{ $cfg.service.type }}
  selector:
    {{- include "underpass-llm.componentSelectorLabels" (dict "root" $root "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ $cfg.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
{{- end }}
