{{- $defaults := .Values.defaults -}}
{{- $dns := $defaults.dns.route53 -}}
{{- if $dns.enabled }}
{{- range $name, $inst := .Values.instances }}
{{- if $inst.enabled }}
{{- $ing := mergeOverwrite (deepCopy $defaults.ingress) ($inst.ingress | default dict) }}
{{- if $ing.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-{{ $name }}-dns
  labels:
    app: vllm-{{ $name }}
    {{- include "vllm.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: vllm-{{ $name }}-dns
    spec:
      restartPolicy: Never
      containers:
        - name: route53
          image: "{{ $dns.image.repository }}:{{ $dns.image.tag }}"
          imagePullPolicy: {{ $dns.image.pullPolicy }}
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $dns.credentialsSecret }}
                  key: {{ $dns.accessKeyIdKey }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $dns.credentialsSecret }}
                  key: {{ $dns.secretAccessKeyKey }}
            - name: AWS_DEFAULT_REGION
              value: {{ $dns.region | quote }}
            - name: HOSTED_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $dns.credentialsSecret }}
                  key: {{ $dns.hostedZoneIdKey }}
          command:
            - /bin/sh
            - -c
            - |
              aws route53 change-resource-record-sets \
                --hosted-zone-id "$HOSTED_ZONE_ID" \
                --change-batch '{
                  "Changes": [{
                    "Action": "UPSERT",
                    "ResourceRecordSet": {
                      "Name": "{{ $ing.host }}",
                      "Type": "A",
                      "TTL": {{ $dns.ttl }},
                      "ResourceRecords": [{"Value": "{{ $dns.target }}"}]
                    }
                  }]
                }'
              echo "DNS record {{ $ing.host }} -> {{ $dns.target }} upserted"
{{- end }}
{{- end }}
{{- end }}
{{- end }}
