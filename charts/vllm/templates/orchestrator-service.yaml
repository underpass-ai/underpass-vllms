{{- if .Values.orchestrator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "underpass-llm.componentName" (dict "root" . "component" "orchestrator") }}
  labels:
    {{- include "underpass-llm.componentLabels" (dict "root" . "component" "orchestrator") | nindent 4 }}
spec:
  type: {{ .Values.orchestrator.service.type }}
  selector:
    {{- include "underpass-llm.componentSelectorLabels" (dict "root" . "component" "orchestrator") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.orchestrator.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
