{{- $defaults := .Values.defaults -}}
{{- range $name, $inst := .Values.instances }}
{{- if and $inst.enabled ($inst.ingress | default $defaults.ingress).enabled }}
{{- $ing := mergeOverwrite (deepCopy $defaults.ingress) ($inst.ingress | default dict) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-{{ $name }}
  labels:
    app: vllm-{{ $name }}
    {{- include "vllm.labels" $ | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    {{- if $ing.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $ing.clusterIssuer | quote }}
    {{- end }}
    {{- if $ing.mtls.enabled }}
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-secret: {{ printf "%s/%s" $.Release.Namespace $ing.mtls.clientCaSecret | quote }}
    {{- end }}
spec:
  ingressClassName: {{ $ing.className | quote }}
  tls:
    - hosts:
        - {{ $ing.host | quote }}
      secretName: {{ $ing.tlsSecret | quote }}
  rules:
    - host: {{ $ing.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm-{{ $name }}
                port:
                  number: {{ $defaults.service.port }}
{{- end }}
{{- end }}
