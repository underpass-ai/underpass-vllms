nameOverride: ""
fullnameOverride: ""

serviceMonitor:
  enabled: false
  labels: {}
  interval: 30s
  path: /metrics

cache:
  enabled: true
  existingClaim: ""
  storageClass: ""
  size: 50Gi
  accessMode: ReadWriteOnce
  mountPath: /tmp/hf-cache
  emptyDirSizeLimit: 20Gi

dns:
  route53:
    enabled: false
    target: ""
    ttl: 300
    region: eu-south-2
    credentialsSecret: prod-route53-credentials-secret
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key
    hostedZoneIdKey: hosted-zone-id
    image:
      repository: public.ecr.aws/aws-cli/aws-cli
      tag: "2.17.47"
      pullPolicy: IfNotPresent

reasoning:
  enabled: false
  imagePullSecrets: []
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  model: ""
  tensorParallelSize: 0
  maxModelLen: 0
  maxNumSeqs: 0
  gpuMemoryUtilization: 0
  enforceEager: false
  lora:
    enabled: false
    maxRank: 16
    adapters: []
  adapterVolume:
    enabled: false
    mountPath: /adapters
    hostPath: ""
    hostPathType: Directory
  extraArgs: []
  env:
    HF_HOME: /tmp/hf-cache
    LD_LIBRARY_PATH: /usr/lib
    VLLM_ATTENTION_BACKEND: FLASHINFER
  huggingface:
    tokenSecret: huggingface-token
    tokenKey: HF_TOKEN
  shmSizeLimit: 2Gi
  resources:
    requests:
      cpu: 8
      memory: 64Gi
      nvidia.com/gpu: 4
    limits:
      cpu: 16
      memory: 96Gi
      nvidia.com/gpu: 4
  probes:
    startup:
      periodSeconds: 10
      failureThreshold: 180
    readiness:
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      periodSeconds: 30
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: nginx
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: ""
    mtls:
      enabled: false
      clientCaSecret: ""

structured:
  enabled: false
  imagePullSecrets: []
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  model: ""
  tensorParallelSize: 0
  maxModelLen: 0
  maxNumSeqs: 0
  gpuMemoryUtilization: 0
  enforceEager: false
  lora:
    enabled: false
    maxRank: 16
    adapters: []
  adapterVolume:
    enabled: false
    mountPath: /adapters
    hostPath: ""
    hostPathType: Directory
  extraArgs: []
  env:
    HF_HOME: /tmp/hf-cache
    LD_LIBRARY_PATH: /usr/lib
  huggingface:
    tokenSecret: huggingface-token
    tokenKey: HF_TOKEN
  shmSizeLimit: 2Gi
  resources:
    requests:
      cpu: 2
      memory: 16Gi
      nvidia.com/gpu: 1
    limits:
      cpu: 4
      memory: 24Gi
      nvidia.com/gpu: 1
  probes:
    startup:
      periodSeconds: 10
      failureThreshold: 120
    readiness:
      periodSeconds: 10
      failureThreshold: 3
    liveness:
      periodSeconds: 30
      failureThreshold: 3
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: nginx
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: ""
    mtls:
      enabled: false
      clientCaSecret: ""

orchestrator:
  enabled: false
  replicaCount: 1
  imagePullSecrets: []
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  addr: :8080
  modelType: ""
  pass1:
    provider: ""
    baseURL: ""
    model: ""
    apiKey: ""
  pass2:
    provider: ""
    baseURL: ""
    model: ""
    apiKey: ""
  config:
    maxIntermediateBytes: 0
    pass2RetryCount: 0
    pass1PromptVersion: ""
    pass2PromptVersion: ""
    singlePassPromptVersion: ""
    irVersion: ""
    pass1SystemPrompt: ""
    pass2SystemPrompt: ""
    singlePassSystemPrompt: ""
    pass1UserPromptTemplate: ""
    pass2UserPromptTemplate: ""
    singlePassUserPromptTemplate: ""
    pass2RetryHintTemplate: ""
    pass1Temperature: ""
    pass1TopP: ""
    pass1TopK: ""
    pass1PresencePenalty: ""
    pass1RepetitionPenalty: ""
    pass2Temperature: ""
    pass2TopP: ""
    pass2TopK: ""
    pass2PresencePenalty: ""
    pass2RepetitionPenalty: ""
    pass1MaxTokens: 0
    pass2MaxTokens: 0
    pass1ThinkingTokenBudget: 0
    pass2ThinkingTokenBudget: 0
    pass1ReasoningEffort: ""
    pass2ReasoningEffort: ""
    pass1PreserveThinking: ""
    pass2PreserveThinking: ""
    pass1Timeout: ""
    pass2Timeout: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    className: nginx
    host: ""
    tls:
      enabled: false
      secretName: ""
      clusterIssuer: ""
    mtls:
      enabled: false
      clientCaSecret: ""
